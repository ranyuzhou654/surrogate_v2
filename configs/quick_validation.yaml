# ============================================================
# 快速验证：中等规模，验证各系统基本检测能力（~15-30 分钟）
# ============================================================
# 用途：修改参数后快速确认 AUROC 是否合理
# 运行：python run_experiments.py --experiment robustness --config configs/quick_validation.yaml
# ============================================================

seed: 42

time_series:
  T: 2000
  transient: 500

surrogate_robustness:
  systems: [logistic, lorenz, henon, rossler, hindmarsh_rose, kuramoto]
  methods: [iaaft, cycle_shuffle, phase, auto]
  n_surrogates: 49
  N: 10
  topology: ER
  er_p: 0.3
  n_reps: 3
  fdr: false

  # 使用新默认值（adaptive_rho=true, theiler_w=auto）
  # 如需关闭取消注释：
  # seccm_kwargs:
  #   adaptive_rho: false
  #   theiler_w: 0

  T_sweep:
    values: [500, 1000, 2000, 3000]
    transient: 500

  coupling_sweep:
    logistic:  [0.02, 0.05, 0.1, 0.2]
    lorenz:    [1.5, 3.0, 5.0, 15.0]
    henon:     [0.02, 0.05, 0.07, 0.1]
    rossler:   [0.1, 0.2, 0.5, 1.0]
    hindmarsh_rose: [0.02, 0.05, 0.1, 0.2]
    kuramoto:  [0.05, 0.1, 0.2, 0.5]

  obs_noise_sweep:
    values: [0.0, 0.01, 0.05, 0.1]

  dyn_noise_sweep:
    values: [0.0, 0.005, 0.01, 0.05]

  coupling:
    logistic: 0.1
    lorenz: 3.0
    henon: 0.05
    rossler: 0.2
    hindmarsh_rose: 0.1
    kuramoto: 0.1

n_jobs: 8
output_dir: results/quick_validation
