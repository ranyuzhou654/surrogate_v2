# Smoke test config for surrogate robustness experiment
# Tests all 10 methods + auto across 2 systems with minimal reps
# 2 systems × 11 methods × 2 sweep values × 2 reps ≈ 5-10 min

seed: 42

time_series:
  T: 500
  transient: 200

surrogate_robustness:
  systems: [logistic, lorenz]
  methods: [fft, aaft, iaaft, timeshift, random_reorder, cycle_shuffle, twin, phase, small_shuffle, truncated_fourier, auto]
  n_surrogates: 19
  N: 5
  topology: ER
  er_p: 0.3
  n_reps: 2
  fdr: false

  seccm_kwargs:
    theiler_w: 0
    adaptive_rho: false

  T_sweep:
    values: [300, 500]
    transient: 200

  coupling_sweep:
    logistic: [0.05, 0.1]
    lorenz:   [1.5, 3.0]

  obs_noise_sweep:
    values: [0.0, 0.05]

  dyn_noise_sweep:
    values: [0.0, 0.01]

  coupling:
    logistic: 0.1
    lorenz: 3.0

n_jobs: 1
output_dir: results/smoke_test
