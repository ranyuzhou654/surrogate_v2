# ============================================================
# 冒烟测试：验证管线可用性（~2-5 分钟）
# ============================================================
# 用途：代码修改后快速验证管线不报错
# 运行：python run_experiments.py --experiment robustness --config configs/smoke_test.yaml
# ============================================================

seed: 42

time_series:
  T: 500
  transient: 200

surrogate_robustness:
  systems: [logistic, lorenz]
  methods: [fft, iaaft, auto]
  n_surrogates: 19
  N: 5
  topology: ER
  er_p: 0.3
  n_reps: 2
  fdr: false

  T_sweep:
    values: [300, 500]
    transient: 200

  coupling_sweep:
    logistic: [0.05, 0.1]
    lorenz:   [1.5, 3.0]

  obs_noise_sweep:
    values: [0.0, 0.05]

  dyn_noise_sweep:
    values: [0.0, 0.01]

  coupling:
    logistic: 0.1
    lorenz: 3.0

n_jobs: 4
output_dir: results/smoke_test
